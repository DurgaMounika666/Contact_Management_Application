<!DOCTYPE html>
<html>
<head>
    <title>Contact Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial, sans-serif;
        }

        .container-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .btn-custom {
            background: #667eea;
            color: white;
            border-radius: 25px;
            padding: 10px 25px;
        }

        .btn-custom:hover {
            background: #5a67d8;
        }

        input {
            border-radius: 10px !important;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="container-box">

        <h2>📇 Contact Management</h2>
        <hr>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}
              <div class="alert alert-success text-center">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- Add Contact Form -->
        <form method="POST" action="/add">

            <div class="row mb-3">
                <div class="col">
                    <input name="first_name" placeholder="First Name" required class="form-control">
                </div>
                <div class="col">
                    <input name="last_name" placeholder="Last Name" class="form-control">
                </div>
            </div>

            <input name="address" placeholder="Address" class="form-control mb-3">

            <input name="email" type="email" placeholder="Email" required class="form-control mb-3">

            <input name="phone"
                   placeholder="Phone Number"
                   pattern="[0-9]+"
                   title="Only numbers allowed"
                   class="form-control mb-3"
                   required>

            <div class="text-center">
                <button class="btn btn-custom">Add Contact</button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
